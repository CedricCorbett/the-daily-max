name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supabase:
    name: Supabase migrations + edge functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy rally-fanout --no-verify-jwt
          supabase functions deploy settle-battles --no-verify-jwt
          supabase functions deploy streak-sweep --no-verify-jwt

  # Gate Cloudflare deploy on presence of API token. When absent (e.g. first-run before
  # the token is added to repo secrets), skip cleanly so the workflow stays green.
  cf-gate:
    name: Cloudflare — check token
    runs-on: ubuntu-latest
    needs: supabase
    outputs:
      has_token: ${{ steps.gate.outputs.has_token }}
    steps:
      - id: gate
        env:
          HAS_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        run: echo "has_token=$HAS_TOKEN" >> $GITHUB_OUTPUT

  cloudflare:
    name: Cloudflare Worker (cron)
    runs-on: ubuntu-latest
    needs: cf-gate
    if: needs.cf-gate.outputs.has_token == 'true'
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install wrangler
        run: npm i -g wrangler@latest

      - name: Push secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          printf '%s' "$SUPABASE_URL"               | wrangler secret put SUPABASE_URL
          printf '%s' "$SUPABASE_SERVICE_ROLE_KEY"  | wrangler secret put SUPABASE_SERVICE_ROLE_KEY
          printf '%s' "$CRON_SHARED_SECRET"         | wrangler secret put CRON_SHARED_SECRET

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy
