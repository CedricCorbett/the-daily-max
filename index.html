<style>
  :root {
    --bg: #0A0707;
    --bg-2: #100A0A;
    --card: #150D0D;
    --card-2: #1C1313;
    --border: #2A1B1B;
    --border-2: #3A2626;
    --text: #FFFFFF;
    --text-dim: #E5E0D6;
    --text-mute: #B8AFA3;
    --accent: #8B1A1A;       /* oxblood */
    --accent-2: #B32121;     /* brighter oxblood */
    --accent-dim: #2A0909;
    --streak: #C9A24A;       /* gold */
    --streak-2: #E6C068;
    --streak-dim: #2A1F0B;
    --danger: #B32121;
    --bone: #F2ECE2;
    --ash: #6B6159;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #000; color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; overflow: hidden;
  }
  body { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; }
  #app-frame {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 0%, #0A0606 0%, #000 60%);
  }
  #phone {
    width: 390px; height: 844px;
    max-height: 100vh;
    background: var(--bg);
    position: relative; overflow: hidden;
    border-radius: 42px;
    border: 1px solid #1A1010;
    box-shadow: 0 60px 120px rgba(139,26,26,0.12), 0 0 0 6px #060404;
  }
  @media (max-width: 430px) {
    #phone { width: 100vw; height: 100vh; border-radius: 0; border: none; box-shadow: none; }
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .display { font-family: 'Archivo Black', 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; }

  /* scroll area — respect iOS safe area (Dynamic Island / notch + home indicator) */
  .screen {
    position: absolute; inset: 0;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    display: flex; flex-direction: column;
    overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
  }
  .screen::-webkit-scrollbar { display: none; }

  /* utility */
  .uppercase { text-transform: uppercase; }
  .tracking-wide { letter-spacing: 0.15em; }
  .tracking-wider { letter-spacing: 0.25em; }

  /* spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse-hazard { 0%,100% { box-shadow: 0 0 0 0 rgba(255,77,31,0.4); } 50% { box-shadow: 0 0 0 8px rgba(255,77,31,0); } }
  @keyframes pulse-green { 0%,100% { box-shadow: 0 0 0 0 rgba(196,255,0,0.4); } 50% { box-shadow: 0 0 0 8px rgba(196,255,0,0); } }
  @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes flash { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes blip { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
  @keyframes scan {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  /* hazard stripe */
  .hazard-stripe {
    background: repeating-linear-gradient(
      135deg,
      #8B1A1A 0 12px,
      #0A0707 12px 24px
    );
  }
  .gold-stripe {
    background: repeating-linear-gradient(
      135deg,
      #C9A24A 0 10px,
      #0A0707 10px 20px
    );
  }
  @keyframes phrase-in { 0% { opacity: 0; transform: translateY(12px); letter-spacing: 0.2em; } 30% { opacity: 1; letter-spacing: -0.01em; } 85% { opacity: 1; } 100% { opacity: 0; transform: translateY(-8px); } }
  @keyframes fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes crosshair { 0%,100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.06); opacity: 1; } }
</style>
